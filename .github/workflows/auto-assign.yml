name: Auto Assign Issue

on:
  issues:
    types: [opened]

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
    - name: Auto-assign issue
      uses: pozil/auto-assign-issue@v2
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        assignees: dogukansahil
        numOfAssignees: 1